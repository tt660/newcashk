<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>تسجيل الخروج</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        :root {
            color-scheme: light;
            --surface: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #4f46e5;
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --surface: #0f172a;
            --text: #f8fafc;
            --muted: #cbd5e1;
            --primary: #818cf8;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #0f172a, #334155);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
        }

        .card {
            border: 0;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.24);
            background: var(--surface);
            color: var(--text);
        }

        .text-muted {
            color: var(--muted) !important;
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="card p-4 text-center" style="max-width: 420px; width: 90%;">
        <h1 class="h4 fw-bold mb-3">تم تسجيل الخروج</h1>
        <p class="text-muted mb-4">سيتم تحويلك إلى الصفحة الرئيسية خلال ثوانٍ قليلة.</p>
        <a href="index.html" class="btn btn-primary">العودة إلى الصفحة الرئيسية</a>
    </div>

    <script>
        (function () {
            try {
                const saved = localStorage.getItem('cashak-theme');
                if (saved) {
                    document.documentElement.setAttribute('data-theme', saved);
                }
            } catch (e) { }
        })();

        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1200);
    </script>
    <script src="scroll-controls.js"></script>
</body>

</html>
